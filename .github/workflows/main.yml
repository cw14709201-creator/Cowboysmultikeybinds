name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find the Gradle project
        id: find
        run: |
          if [ -f gradlew ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          else
            d=$(dirname "$(find . -name gradlew -not -path '*/.*' | head -1)")
            echo "dir=$d" >> "$GITHUB_OUTPUT"
          fi
          echo "Project dir: $(cat "$GITHUB_OUTPUT")"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        working-directory: ${{ steps.find.outputs.dir }}
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: cowboys-multi-keybinds
          path: ${{ steps.find.outputs.dir }}/build/libs/*.jar
